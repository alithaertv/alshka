<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALSHKA | الحساب الشخصي</title>
    
    <!-- Meta tags for SEO and Social Media -->
    <meta name="description" content="الصفحة الشخصية والتعريفية لـ ALSHKA. تواصل معي عبر جميع منصات التواصل الاجتماعي الخاصة بي في مكان واحد.">
    <meta property="og:title" content="ALSHKA | الحساب الشخصي">
    <meta property="og:description" content="الصفحة الشخصية والتعريفية لـ ALSHKA. تواصل معي عبر جميع منصات التواصل الاجتماعي الخاصة بي.">
    <meta property="og:image" content="avatar.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="avatar.png">
    
    <!-- Google Fonts: Tajawal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Glows -->
    <div class="glow-container">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <!-- Main Container -->
    <main class="profile-container" id="profileContainer">
        <!-- Profile Header -->
        <header class="profile-header">
            <div class="avatar-wrapper">
                <img src="avatar.png" alt="ALSHKA Avatar" class="profile-avatar" id="profileAvatar">
                <div class="avatar-ring"></div>
            </div>
            <h1 class="profile-name" id="profileName">
                ALSHKA
                <span class="verified-badge" title="حساب موثق"><i class="fas fa-check-circle"></i></span>
            </h1>
            <p class="profile-bio" id="profileBio">مرحباً بك في صفحتي التعريفية الشخصية. يمكنك الوصول إلى جميع حساباتي الرسمية وقنوات التواصل معي من خلال الروابط أدناه.</p>
        </header>

        <!-- Main Action Buttons (Share, QR) -->
        <div class="action-buttons">
            <button class="action-btn" id="shareBtn" title="نسخ رابط الصفحة">
                <i class="fas fa-share-alt"></i>
                <span>مشاركة الصفحة</span>
            </button>
            <button class="action-btn" id="qrBtn" title="عرض رمز QR">
                <i class="fas fa-qrcode"></i>
                <span>رمز QR</span>
            </button>
        </div>

        <!-- Social Links List (Dynamic) -->
        <section class="links-section" id="linksSection">
            <!-- Dynamic link cards will be injected here via JavaScript -->
        </section>

        <!-- Footer -->
        <footer class="profile-footer">
            <p>© <span id="currentYear"></span> جميع الحقوق محفوظة لـ <span class="footer-highlight" id="footerName">ALSHKA</span></p>
            <a href="admin.html" class="admin-link-footer" title="لوحة التحكم">
                <i class="fas fa-cog"></i>
            </a>
        </footer>
    </main>

    <!-- QR Code Modal -->
    <div class="modal-overlay" id="qrModal">
        <div class="modal-card">
            <button class="close-modal-btn" id="closeModalBtn" aria-label="إغلاق النافذة">
                <i class="fas fa-times"></i>
            </button>
            <h3 class="modal-title">رمز الاستجابة السريعة (QR Code)</h3>
            <p class="modal-desc">امسح الرمز أدناه بهاتفك لفتح الصفحة ومشاركتها بسهولة.</p>
            <div class="qr-wrapper">
                <div id="qrPlaceholder" class="qr-placeholder">
                    <i class="fas fa-spinner fa-spin"></i>
                </div>
                <img id="qrImage" src="" alt="QR Code" style="display: none;">
            </div>
            <button class="download-qr-btn" id="downloadQrBtn">
                <i class="fas fa-download"></i>
                <span>تحميل رمز QR</span>
            </button>
        </div>
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="toast">
        <div class="toast-content">
            <i class="fas fa-check-circle toast-icon"></i>
            <span class="toast-message">تم نسخ الرابط بنجاح!</span>
        </div>
    </div>

    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
